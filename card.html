<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D VIP 會員卡動畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827; /* Tailwind gray-900 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 3D 場景與透視 */
        .card-scene {
            perspective: 1000px;
            width: 384px; /* 96 * 4px */
            height: 240px; /* 60 * 4px */
        }

        /* 卡片內部容器，用於保持 3D 效果與翻轉 */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 當滑鼠停在場景上時，翻轉卡片 */
        .card-scene:hover .card-inner {
            transform: rotateY(180deg);
        }

        /* 卡片正反面共用設定 */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            overflow: hidden;
        }

        /* 卡片正面樣式 */
        .card-front {
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            color: #fbbf24; /* Tailwind amber-400 */
            border: 1px solid #374151;
        }

        /* 卡片背面樣式 */
        .card-back {
            background: linear-gradient(135deg, #e5e7eb 0%, #9ca3af 100%);
            transform: rotateY(180deg); /* 預先翻轉背面，使其在翻轉後呈正向 */
            color: #1f2937;
            position: relative;
        }

        /* 磁條 */
        .magnetic-strip {
            width: 100%;
            height: 45px;
            background-color: #111827;
            margin-top: 25px;
        }

        /* 簽名欄 */
        .signature-strip {
            width: 80%;
            height: 35px;
            background-color: #f3f4f6;
            margin: 15px auto;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                #e5e7eb 10px,
                #e5e7eb 20px
            );
        }

        /* SVG 紅色框框動畫設定 */
        .animated-box {
            fill: none;
            stroke: #ef4444; /* Tailwind red-500 */
            stroke-width: 3;
            /* pathLength="100" 在 HTML 中設定了，所以這裡可以用 100 */
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            /* 預設隱藏且無延遲 */
            transition: stroke-dashoffset 0.1s;
        }

        /* 當卡片翻轉（Hover）時，觸發畫框動畫 */
        /* 延遲 0.6 秒，等卡片翻轉得差不多了再開始畫 */
        .card-scene:hover .animated-box {
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.8s ease-in-out 0.6s;
        }

        /* 晶片樣式 */
        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            border: 1px solid #78350f;
        }
        .chip::before, .chip::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(120, 53, 15, 0.4);
        }
        .chip::before { top: 30%; }
        .chip::after { bottom: 30%; }
        .chip-lines {
            position: absolute;
            width: 1px;
            height: 100%;
            background: rgba(120, 53, 15, 0.4);
            left: 30%;
            box-shadow: 18px 0 0 rgba(120, 53, 15, 0.4);
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen selection:bg-red-500 selection:text-white">

    <div class="text-center">
        <h1 class="text-gray-300 text-2xl font-bold mb-8 tracking-wider">將滑鼠停在卡片上 <span class="animate-pulse">👇</span></h1>
        
        <!-- 3D 卡片場景 -->
        <div class="card-scene mx-auto cursor-pointer">
            <!-- 翻轉容器 -->
            <div class="card-inner">
                
                <!-- 卡片正面 -->
                <div class="card-front relative shadow-inner">
                    <!-- 裝飾背景光暈 -->
                    <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-600 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>
                    
                    <div class="flex justify-between items-start">
                        <div class="text-2xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600">
                            VIP
                        </div>
                        <!-- NFC Icon -->
                        <svg class="w-8 h-8 text-yellow-500 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 5.636a9 9 0 0112.728 0M12 3v.01M7.05 7.05a7 7 0 019.9 0M12 6v.01M8.464 8.464a5 5 0 017.072 0M12 9v.01M9.879 9.879a3 3 0 014.242 0M12 12v.01M11 15h2v6h-2z"></path>
                        </svg>
                    </div>

                    <div>
                        <!-- 模擬晶片 -->
                        <div class="chip mb-4">
                            <div class="chip-lines"></div>
                        </div>
                        <div class="text-xs tracking-widest text-gray-400 mb-1">MEMBERSHIP CARD</div>
                        <div class="text-lg font-mono tracking-[0.2em] text-gray-200">PREMIUM ACCOUNT</div>
                    </div>
                </div>

                <!-- 卡片背面 -->
                <div class="card-back flex flex-col">
                    <!-- 黑色磁條 -->
                    <div class="magnetic-strip shadow-md"></div>
                    
                    <!-- 簽名欄 -->
                    <div class="signature-strip relative flex items-center justify-end px-2">
                        <span class="text-xs italic text-gray-400 font-serif mr-2">Authorized Signature</span>
                    </div>

                    <!-- 會員編號與紅框動畫區域 -->
                    <div class="flex-grow flex items-center justify-center relative mt-2">
                        <div class="text-center relative inline-block px-6 py-2">
                            <span class="text-sm font-bold text-gray-600 tracking-wider mr-2">ID:</span>
                            <!-- 六位數會員編號 -->
                            <span class="text-3xl font-mono font-bold tracking-widest text-gray-800 drop-shadow-sm">
                                852739
                            </span>

                            <!-- SVG 紅框動畫，疊加在會員編號上方 -->
                            <!-- 使用 pathLength="100" 讓我們在 CSS 中更容易控制百分比進度 -->
                            <svg class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-visible" 
                                 viewBox="0 0 100 100" 
                                 preserveAspectRatio="none">
                                <rect 
                                    x="0" 
                                    y="0" 
                                    width="100%" 
                                    height="100%" 
                                    rx="6" 
                                    class="animated-box"
                                    pathLength="100">
                                </rect>
                            </svg>
                        </div>
                    </div>

                    <div class="text-center text-[10px] text-gray-500 mb-4 pb-2">
                        If found, please return to the issuer. <br> Property of VIP Club.
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
